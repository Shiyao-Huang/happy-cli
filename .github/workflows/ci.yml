name: CI

on:
  push:
    branches: [main, online-v3]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Typecheck
        run: NODE_OPTIONS="--max-old-space-size=8192" yarn typecheck

      - name: Lint
        run: npx eslint src/ --max-warnings=0

  build-and-test:
    name: Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Run unit tests (exclude E2E)
        run: |
          node --max-old-space-size=8192 ./node_modules/.bin/vitest run \
            --exclude='**/*E2E*' \
            --exclude='**/*.e2e.*' \
            --reporter=verbose
        env:
          NODE_ENV: test
          AHA_HOME_DIR: /tmp/aha-ci-test
