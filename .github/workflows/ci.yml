name: CI

on:
  push:
    branches: [main, online-v3]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Type check
        run: |
          NODE_OPTIONS="--max-old-space-size=8192" yarn tsc --noEmit --skipLibCheck
        continue-on-error: true

      - name: Run tests
        run: yarn test --run

      - name: Build
        run: yarn build
